<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- source temple arm (solid, top) -->
  <path d="M 2 5 L 13 5 C 15 5 16 6 16 7.5"/>
  <!-- arrow: send to the other temple workspace -->
  <line x1="10" y1="8.5" x2="10" y2="12"/>
  <path d="M 8 10.5 L 10 12.5 L 12 10.5"/>
  <!-- target temple arm (dashed, mirrored, bottom) -->
  <path d="M 2 15 L 13 15 C 15 15 16 14 16 12.5" stroke-dasharray="2 2"/>
</svg>
