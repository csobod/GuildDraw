<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <!-- grab point (bottom-left) with crosshair -->
  <circle cx="5.5" cy="18.5" r="2" stroke-width="1.4"/>
  <line x1="5.5" y1="15.5" x2="5.5" y2="17" stroke-width="1.2"/>
  <line x1="5.5" y1="20" x2="5.5" y2="21.5" stroke-width="1.2"/>
  <line x1="2.5" y1="18.5" x2="4" y2="18.5" stroke-width="1.2"/>
  <line x1="7" y1="18.5" x2="8.5" y2="18.5" stroke-width="1.2"/>
  <!-- destination point (top-right) with crosshair -->
  <circle cx="18.5" cy="5.5" r="2" stroke-width="1.4"/>
  <line x1="18.5" y1="2.5" x2="18.5" y2="4" stroke-width="1.2"/>
  <line x1="18.5" y1="7" x2="18.5" y2="8.5" stroke-width="1.2"/>
  <line x1="15.5" y1="5.5" x2="17" y2="5.5" stroke-width="1.2"/>
  <line x1="20" y1="5.5" x2="22" y2="5.5" stroke-width="1.2"/>
  <!-- dashed arrow from grab to destination -->
  <line x1="7.5" y1="16.5" x2="16.5" y2="7.5" stroke-width="1.3" stroke-dasharray="2.2,1.5"/>
  <!-- arrowhead at destination end -->
  <polyline points="13.5,7  16.5,7.5  16,10.5" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
</svg>
